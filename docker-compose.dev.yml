# ============================================================
# 开发环境 — 仅 MySQL + Redis 中间件
# ============================================================
# 使用方式:
#   docker compose -f docker-compose.dev.yml up -d
# 然后原生启动各服务:
#   cd exam-backend && mvn spring-boot:run
#   cd exam-frontend && npm run dev
#   cd ai-tutor && python main.py

services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: exam
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: exam-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data_dev:
  redis_data_dev:
