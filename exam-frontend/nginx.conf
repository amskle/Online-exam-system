# ============================================================
# 在线考试系统 + 智能学习伙伴 Nginx 配置（Docker 部署用）
# ============================================================
# 服务名通过 Docker 网络解析，本地开发用 repo root 的同名文件

upstream exam_backend {
    server backend:8077;  # Spring Boot 考试系统
}

upstream ai_tutor {
    server ai-tutor:8080;  # FastAPI 智能学习伙伴
}

server {
    listen 80;
    server_name localhost;

    # 前端静态资源
    root /usr/share/nginx/html;
    index index.html;

    # ── 考试系统 API ──
    location /api/ {
        proxy_pass http://exam_backend/;  # 末尾 / 去掉 /api/ 前缀
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 智能学习伙伴 API ──
    location /ai/ {
        proxy_pass http://ai_tutor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI 调用可能耗时较长
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # ── 前端 SPA 回退 ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
