spring:
  application:
    name: Online-exam-system
  datasource:
    url: jdbc:mysql://localhost:3306/exam?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:327510}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 连接池配置（HikariCP，Spring Boot 默认）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: MyHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-admin.sql
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 100ms
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:2061133513@qq.com}
    password: ${MAIL_AUTH_CODE:}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true
server:
  port: 8077
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
file:
  upload-dir: file
auth:
  email-code-ttl: 5m
  email-send-cooldown: 60s
  email-daily-limit: 10
  trusted-device-ttl: 7d
  trusted-device-secure-cookie: false

# JWT — 生产环境通过环境变量覆盖
jwt:
  secret: ${JWT_SECRET:t8Kx9mN2vB5qW3pL7sF4cH6jU1yR8eZ0aD5gJ9nM2xP4sV7wC3}
